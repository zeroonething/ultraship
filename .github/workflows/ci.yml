name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
      # No install step: the one dependency (yaml) is vendored under vendor/,
      # so the zero-install guarantee holds in CI too.
      - run: npm test
      - run: node bin/ultraship.mjs validate
