product: ultraship
version: 0.3.0
tasks:
  - id: US-ULTRASHIP-0.3.0-T01
    summary: Add an optional constraints block to the active schema and a constraints CLI command to record and show user-supplied limits.
    why_required: Without a canonical place to record time, budget, and capacity, there is nothing for release fit to be grounded in.
    status: done
    depends_on: []
    acceptance_criteria:
      - A developer sets time, budget, and capacity constraints on a release and they persist to canonical state, each tagged with a user-estimate source
      - The set-constraints command shows the recorded constraints and reports the same figures on a later run without re-entry
    files:
      - schemas/active.schema.json
      - lib/constraints.mjs
      - bin/ultraship.mjs
      - test/constraints.test.mjs
    evidence:
      - test/constraints.test.mjs — set persists all three fields as user-estimate, show round-trips, one field leaves others in place
      - node --test — 202 passing, 0 failing

  - id: US-ULTRASHIP-0.3.0-T02
    summary: Surface recorded constraints in the state snapshot and the active-releases view, always showing the user-estimate source.
    why_required: The develop and iterate skills read fit inputs through the snapshot and views; unsurfaced constraints cannot ground an assessment.
    status: done
    depends_on:
      - US-ULTRASHIP-0.3.0-T01
    acceptance_criteria:
      - state and views display the recorded constraints and their user-estimate source
    files:
      - lib/state.mjs
      - lib/views.mjs
    evidence:
      - test/constraints.test.mjs — snapshot.active.constraints surfaces recorded capacity
      - views.mjs renders a Constraints line tagged with the user-estimate source when any field is set

  - id: US-ULTRASHIP-0.3.0-T03
    summary: Ground the develop and iterate release-fit guidance in recorded constraints, and keep the no-constraints path assessing exactly as 0.2.0 did.
    why_required: Recording constraints delivers no value unless the assessment cites them and recommends fallback scope when they do not fit; the additive path must not regress.
    status: done
    depends_on:
      - US-ULTRASHIP-0.3.0-T02
    acceptance_criteria:
      - When no constraints are recorded, release_fit still assesses qualitatively exactly as it did in 0.2.0 — constraints are additive, not required
      - A 0.2.0 workspace with no recorded constraints loads and behaves unchanged, with no migration required
    files:
      - skills/develop/SKILL.md
      - skills/iterate/SKILL.md
    evidence:
      - develop SKILL.md instructs naming a recorded constraint in reasons and setting recommended_scope_change to fallback_scope when scope exceeds the limits
      - Existing state, views, and validate suites still pass with no constraints block present — constraints are optional in the schema

  - id: US-ULTRASHIP-0.3.0-T04
    summary: Make the RELEASED transition finalize a shipped version's state — mark it released in the roadmap and archive its execution pointer.
    why_required: Without this a shipped release still reads execution_state DEVELOPING and the roadmap status must be hand-edited, the exact gaps found in 0.2.0.
    status: done
    depends_on: []
    acceptance_criteria:
      - after complete runs on a release, the roadmap shows that version as released with no hand edit
      - after complete runs, no shipped version reads execution_state DEVELOPING — active.yaml and active-releases.md no longer show a released version as in development
    files:
      - lib/transition.mjs
      - lib/paths.mjs
      - skills/complete/SKILL.md
      - test/transition.test.mjs
    evidence:
      - test/transition.test.mjs — releasing marks the roadmap released and archives the pointer; missing pointer is a best-effort no-op
      - complete SKILL.md tells the operator the transition finalizes state and not to hand-edit it

  - id: US-ULTRASHIP-0.3.0-T05
    summary: Sync framework_version to the installed release, at init and on migrate.
    why_required: The recorded framework_version stayed at the init value through upgrades, so the workspace lied about which framework last touched it.
    status: done
    depends_on: []
    acceptance_criteria:
      - after a framework upgrade, framework_version in ultraship.yaml matches the installed framework version
    files:
      - lib/init.mjs
      - lib/migrate.mjs
      - test/migrate.test.mjs
      - test/init.test.mjs
    evidence:
      - test/migrate.test.mjs — migrate brings a stale 0.1.0 framework_version up to the installed release and is idempotent
      - init now writes package.json version rather than a literal

  - id: US-ULTRASHIP-0.3.0-T06
    summary: Document the constraints workflow, resource-grounded fit, and release finalization.
    why_required: A capability the user cannot discover is not delivered.
    status: done
    depends_on:
      - US-ULTRASHIP-0.3.0-T01
      - US-ULTRASHIP-0.3.0-T04
    acceptance_criteria:
      - The README and NOTICE document how to record constraints and how fit and scope recommendations use them
    files:
      - README.md
    evidence:
      - README.md — new "Constraints and release fit" section plus the constraints and updated migrate command rows
      - NOTICE reviewed; its lib/, schemas/, bin/ inventory already covers the new files, no change needed, as for 0.2.0
