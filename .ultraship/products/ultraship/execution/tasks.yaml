product: ultraship
version: 0.5.1
tasks:
  - id: US-ULTRASHIP-0.5.1-T01
    summary: Source the publish hook's release notes from the CHANGELOG's latest section instead of --generate-notes, reorder the complete Process to write the changelog before deploy, and update the README and skill guidance.
    why_required: Without it, the dogfooded publish hook produces a threadbare release of PR titles — the exact defect seen on v0.5.0.
    status: done
    depends_on: []
    acceptance_criteria:
      - The workspace's publish hook produces release notes from the CHANGELOG's latest section, not a list of merged pull-request titles
      - The complete skill writes the changelog before running ultraship deploy, so the notes the hook reads already exist
      - No change to lib/, bin/, or the schemas; this is a configuration and documentation fix
      - node --test still reports 215 passing, 0 failing, and ultraship validate still exits 0
      - The README and the complete skill document CHANGELOG-sourced notes and warn against --generate-notes
    files:
      - .ultraship/ultraship.yaml
      - README.md
      - skills/complete/SKILL.md
    evidence:
      - .ultraship/ultraship.yaml — published.deploy now uses --notes "$(awk '/^## \[/{n++} n==1' CHANGELOG.md)"; YAML parses to the correct shell command and validate exits 0
      - skills/complete/SKILL.md — Process writes release notes/changelog (step 7) before ultraship deploy (step 8); deploy guidance warns against --generate-notes
      - README.md — delivery_hooks example sources notes from CHANGELOG with an explanatory comment
      - npm test — 215 passing, 0 failing; no lib/bin/schema change; the live v0.5.0 notes were corrected via gh release edit
