id: ultraship
name: UltraShip
classification: independent-product
vision: >
  Developers working with AI coding agents ship complete, releasable versions
  instead of accumulating half-finished code.
users:
  - >
    A solo developer running several projects at once on a subscription plan,
    who wants each one to reach a finished, releasable state rather than stall
    at eighty percent.
problems:
  - AI agents generate code quickly, but rapid generation does not produce complete products.
  - Plans go stale before execution, and changes get made without a record of why.
  - Work is declared complete when it is not deployable.
  - Inference, time, and money are spent as if they were unlimited.
  - Several projects in flight means several competing definitions of what is true.
outcomes:
  - A vague idea becomes a canonical product definition with no competing second version.
  - Every version delivers a real user outcome and can be released.
  - Plan changes carry their evidence and an approval source.
  - A released record cannot afterwards be silently edited.
  - Work can pause safely and resume without rereading the whole repository.
requirements:
  - Turn a vague idea into an approved canonical product definition
  - Produce a SemVer roadmap whose every version is a complete outcome
  - Generate just-in-time tasks bound to acceptance criteria
  - Record plan changes with evidence, impact, and an approval source
  - Verify completion against gates and store the evidence
  - Make released records immutable in fact, not only by instruction
  - Keep one canonical owner for every fact
  - Refuse to fabricate resource figures the framework cannot observe
constraints:
  - Zero runtime npm dependencies; the YAML parser is vendored
  - Node 20 or newer
  - Claude Code is the only supported agent tool in 0.1.0
  - The CLI never calls a model and never touches the network
public_contract: >
  Ten CLI commands (init, state, transition, product, migrate, constraints,
  deploy, validate, semver, views), the workflow skills (brainstorm, plan,
  develop, iterate, complete) plus supporting skills, and the .ultraship/ state
  schema (ten schema files). This surface is frozen at 1.0; breaking any of it is
  a major version. See docs/CONTRACT.md.
deployment_context: >
  Distributed as a Claude Code plugin installed from a GitHub marketplace.
  Canonical state lives in .ultraship/ inside the user's own repository. There
  is no server and no hosted component.
success_measures:
  - A developer completes a real release using the five skills without editing canonical state by hand.
  - A completion attempt missing evidence is rejected rather than passed.
  - An attempt to edit a released record fails validation.
  - Rerunning brainstorm or plan does not produce a competing definition.
non_goals:
  - Being a general software-engineering skill library
  - Writing the user's application code for them
  - Measuring provider usage UltraShip cannot observe
  - Hosting, dashboards, or any server-side component
  - Replacing the user's existing test, build, or deployment tooling
assumptions:
  - >
    The user runs several projects but rarely needs coordinated cross-product
    launches, so release bundles and shared capabilities are lower value than
    the specification's roadmap assumes. Recorded as an assumption because it
    comes from one conversation, not from observed usage.
  - The user's projects are mostly independent rather than a platform with dependent services.
  - Users are comfortable with YAML and will read canonical state directly when they want to.
mvp_boundary: >
  One developer takes one product from idea to an immutable release record,
  entirely in local canonical state.
