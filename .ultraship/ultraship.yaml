schema_version: 1
framework_version: 0.1.0
version_files:
  - path: package.json
    key: version
  - path: .claude-plugin/plugin.json
    key: version
  - path: .claude-plugin/marketplace.json
    key: plugins.0.version
delivery_hooks:
  published:
    deploy: 'gh release create v$VERSION --title "UltraShip $VERSION" --notes "$(awk ''/^## \[/{n++} n==1'' CHANGELOG.md)" --latest'
    smoke: gh release view v$VERSION --json tagName -q .tagName
resource_profile:
  provider_tool: null
  billing_mode: null
  model_policy: auto
  available:
    time_minutes: null
    token_budget: null
    monetary_budget_usd: null
    human_review_minutes: null
  preferences:
    minimize_cost: true
    allow_additional_spend: false
    allow_model_routing: true
    allow_parallel_agents: false
  telemetry:
    source: unknown
    confidence: low
